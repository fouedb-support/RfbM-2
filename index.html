<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Radio fouedb Music</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* PLAYER */

.radio-player{
position:fixed;
bottom:0;
left:0;
width:100%;
height:130px;
overflow:hidden;
}

/* BACKGROUND */

.playerbg{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
width:100%;
height:100%;
background-image:url(https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/rfbm-background_37.png);
background-position:center;
background-size:cover;
filter:blur(2px);
}

/* CONTENT */

.player-content{
position:relative;
display:flex;
align-items:center;
gap:15px;
padding:15px;
}

/* COVER */

.album-art{
position:relative;
}

.album-art img{
width:75px;
height:75px;
border-radius:50%;
animation:spin 20s linear infinite;
object-fit:cover;
}

/* COVER ROTATION */

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* CONTROLS */

.controls{
display:flex;
flex-direction:column;
gap:6px;
}

button{
background:#ff2a2a;
border:none;
color:white;
padding:6px 10px;
cursor:pointer;
border-radius:4px;
}

#volume{
width:90px;
}

/* SONG */

.song-info{
flex:1;
overflow:hidden;
}

.song{
font-size:16px;
white-space:nowrap;
overflow:hidden;
}

.scroll{
animation:scroll 12s linear infinite;
}

.artist{
font-size:14px;
opacity:0.8;
}

/* SCROLL TEXT */

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* EQUALIZER */

.equalizer{
display:flex;
gap:3px;
align-items:flex-end;
height:20px;
}

.bar{
width:3px;
background:#00ffcc;
height:4px;
}

/* animation active seulement quand player joue */

.playing .bar{
animation:equalize 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}

@keyframes equalize{
0%{height:4px}
50%{height:18px}
100%{height:4px}
}

/* HISTORY */

.history{
position:absolute;
bottom:130px;
left:0;
width:100%;
background:#000;
padding:10px;
font-size:13px;
}

.history div{
padding:2px 0;
}

</style>

</head>

<body>

<div class="radio-player">

<div class="playerbg"></div>

<div class="player-content">

<div class="album-art">

<img id="cover"
src="https://player.live365.com/configs/images/noalbum-white.png">

</div>

<div class="controls">

<button id="play">Play</button>

<input id="volume" type="range" min="0" max="1" step="0.05" value="1">

<div id="equalizer" class="equalizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

</div>

<div class="song-info">

<div id="title" class="song">Loading...</div>

<div id="artist" class="artist"></div>

</div>

</div>

<div id="history" class="history"></div>

</div>

<audio id="radio" preload="none">

<source src="https://streaming.live365.com/a82574_2" type="audio/aac">

</audio>

<script>

/* AUDIO */

var radio=document.getElementById("radio");
var play=document.getElementById("play");
var volume=document.getElementById("volume");
var eq=document.getElementById("equalizer");

play.onclick=function(){

if(radio.paused){

radio.play();
play.innerText="Pause";
eq.classList.add("playing");

}else{

radio.pause();
play.innerText="Play";
eq.classList.remove("playing");

}

}

volume.oninput=function(){
radio.volume=this.value;
}

/* METADATA */

var last="";

async function metadata(){

try{

let r=await fetch("metadata.php");

let j=await r.json();

let artist=j.artist || "";
let title=j.title || "";

let full=artist+" - "+title;

if(full!==last){

last=full;

document.getElementById("artist").textContent=artist;

let titleElem=document.getElementById("title");

titleElem.textContent=title;

/* scroll */

if(title.length>25){

titleElem.classList.add("scroll");

}else{

titleElem.classList.remove("scroll");

}

/* HISTORY */

var h=document.getElementById("history");

var item=document.createElement("div");

item.textContent=full;

h.prepend(item);

if(h.children.length>5){

h.removeChild(h.lastChild);

}

/* COVER (itunes) */

let search=encodeURIComponent(artist+" "+title);

fetch("https://itunes.apple.com/search?term="+search+"&limit=1")

.then(r=>r.json())

.then(data=>{

if(data.results.length){

let img=data.results[0].artworkUrl100;

img=img.replace("100x100","400x400");

document.getElementById("cover").src=img;

}

});

}

}catch(e){}

}

setInterval(metadata,10000);

metadata();

</script>

</body>
</html>
